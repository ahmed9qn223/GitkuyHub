name: Build Protected Playlist

on:
  push:
    branches:
      - main  # หรือ master (แก้ตามที่คุณใช้)
    paths:
      - 'raw_filmhub.json' # ทำงานเมื่อไฟล์นี้มีการเปลี่ยนแปลง
      - 'process_playlist.js'
  workflow_dispatch: # อนุญาตให้กดสั่งรันเองได้จากหน้าเว็บ

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Script to Protect URLs
        run: node process_playlist.js

      - name: Commit and Push output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add filmhub.json
          # ตรวจสอบว่ามีการเปลี่ยนแปลงไหม ถ้ามีให้ commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update protected filmhub.json" && git push)
