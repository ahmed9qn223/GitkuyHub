name: Build Protected Playlist

on:
  push:
    branches:
      - main
    paths:
      - 'raw_filmhub.json'

      - 'process_playlist.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Script to Protect URLs
        run: node process_playlist.js

      - name: Commit and Push output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # แอดทั้ง 2 ไฟล์
          git add filmhub.json serieshub.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update protected playlists" && git push)
